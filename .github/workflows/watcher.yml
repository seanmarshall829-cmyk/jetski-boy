name: Jetski Watcher

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes
  workflow_dispatch:          # lets you trigger it manually with a button

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scan
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
        run: python jetski_watcher.py

      - name: Save memory (so listings never repeat)
        run: |
          git config user.name "jetski-bot"
          git config user.email "bot@users.noreply.github.com"
          git add seen_listings.json daily_log.json || true
          git diff --staged --quiet || git commit -m "update seen listings"
          git push
